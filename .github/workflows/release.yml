name: Create Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10

jobs:
  build:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create PK3 and Zip
        run: |
          VERSION=${{ github.ref_name }}
          # Create the pk3 file from the Walpurgis_Findus_Faith_Tri folder
          cd Walpurgis_Findus_Faith_Tri
          zip -r ../Walpurgis_Findus_Faith_Tri_${VERSION}.pk3 .
          cd ..
          
          # Create the final zip containing README.md and the .pk3 file
          zip "Walpurgis_Findus_Faith_Tri_${VERSION}.zip" README.md Walpurgis_Findus_Faith_Tri_${VERSION}.pk3

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: Walpurgis_Findus_Faith_Tri_${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
